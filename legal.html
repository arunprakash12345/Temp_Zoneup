<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet">
  <title>ZoneUp</title>
  <link rel="icon" type="image/x-icon" href="./Assets/favIcon.svg">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="legal.css">
</head>
<body>
  <div class="header-spacer" id="headerSpacer"></div>
  <header class="header" id="header">
    <div class="header-inner" id="headerInner">
      <div class="header-top">
        <a href="index.html" class="logo">
          <img src="./Assets/logo.svg" class="logo-icon" alt="ZoneUp Logo">
        </a>
        <a href="#" class="btn-purchase">Get the app <span class="btn-icon"><span data-icon="⚡">⚡</span></span></a>
      </div>
    </div>
  </header>

  <main class="legal-page">
    <div class="legal-container">
      <h1 class="legal-title" id="legalTitle"></h1>
      <div class="legal-content" id="legalContent"></div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">

          <div class="footer-cta-buttons">
            <a href="#" class="btn-purchase footer-btn-light">Get the app <span class="btn-icon"><span data-icon="⚡">⚡</span></span></a>
          </div>
        </div>
        <div class="footer-socials">
          <a href="#" aria-label="Twitter" class="social-icon social-x">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772" stroke="currentColor" stroke-width="2" fill="none"/></svg>
          </a>
          <a href="#" aria-label="LinkedIn" class="social-icon social-linkedin">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z" stroke="none"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
          </a>
          <a href="#" aria-label="YouTube" class="social-icon social-youtube">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.94-2C18.88 4 12 4 12 4s-6.88 0-8.6.46a2.78 2.78 0 0 0-1.94 2A29 29 0 0 0 1 11.75a29 29 0 0 0 .46 5.33A2.78 2.78 0 0 0 3.4 19.1c1.72.46 8.6.46 8.6.46s6.88 0 8.6-.46a2.78 2.78 0 0 0 1.94-2 29 29 0 0 0 .46-5.25 29 29 0 0 0-.46-5.33z" stroke="none"/><polygon points="9.75 15.02 15.5 11.75 9.75 8.48 9.75 15.02" fill="#1a1a1a"/></svg>
          </a>
          <a href="#" aria-label="Discord" class="social-icon social-discord">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.095 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>
          </a>
          <a href="#" aria-label="Instagram" class="social-icon social-instagram">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
          </a>
        </div>
      </div>
      <div class="footer-watermark" id="footerWatermark">
        <span class="watermark-text">zoneup</span>
        <div class="watermark-glow" id="watermarkGlow"></div>
      </div>
      <div class="footer-bottom-bar">
        <div class="footer-status">
          <span class="status-dot"></span>
          <span>Alive & Kicking!</span>
        </div>
        <div class="footer-legal">
          <a href="legal.html?page=privacy-policy"><span data-text="Privacy Policy">Privacy Policy</span></a>
          <a href="legal.html?page=cookies-policy"><span data-text="Cookies Policy">Cookies Policy</span></a>
          <a href="legal.html?page=terms-of-service"><span data-text="Terms and Condition">Terms and Condition</span></a>
          <a href="legal.html?page=delete-account"><span data-text="Delete Account">Delete Account</span></a>
        </div>
        <p class="footer-copyright">© ZoneUp Private Limited — 2026</p>
      </div>
    </div>
  </footer>

  <script>
    // Header shrink
    const header = document.getElementById('header');
    const spacer = document.getElementById('headerSpacer');
    spacer.style.height = header.offsetHeight + 'px';

    window.addEventListener('scroll', function() {
      if (window.scrollY > spacer.offsetHeight) {
        header.classList.add('shrink');
      } else {
        header.classList.remove('shrink');
      }
    });

    // Watermark glow
    var footerWatermark = document.getElementById('footerWatermark');
    var watermarkText = footerWatermark ? footerWatermark.querySelector('.watermark-text') : null;
    if (footerWatermark && watermarkText) {
      footerWatermark.addEventListener('mousemove', function(e) {
        if (window.innerWidth > 768) {
          var rect = footerWatermark.getBoundingClientRect();
          var x = e.clientX - rect.left;
          var y = e.clientY - rect.top;
          watermarkText.style.background = 'radial-gradient(circle 400px at ' + x + 'px ' + y + 'px, rgba(67, 206, 162, 0.55) 0%, rgba(24, 90, 157, 0.3) 25%, rgba(67, 206, 162, 0.1) 50%, rgba(255, 255, 255, 0.06) 70%)';
          watermarkText.style.webkitBackgroundClip = 'text';
          watermarkText.style.backgroundClip = 'text';
        }
      });
      footerWatermark.addEventListener('mouseleave', function() {
        if (window.innerWidth > 768) {
          watermarkText.style.background = 'rgba(255, 255, 255, 0.06)';
          watermarkText.style.webkitBackgroundClip = 'text';
          watermarkText.style.backgroundClip = 'text';
        }
      });
    }

    // Determine which JSON to load from query param
    var params = new URLSearchParams(window.location.search);
    var page = params.get('page') || 'privacy-policy';
    var allowed = ['privacy-policy', 'terms-of-service', 'cookies-policy', 'delete-account'];
    if (allowed.indexOf(page) === -1) page = 'privacy-policy';

    document.title = page.replace(/-/g, ' ').replace(/\b\w/g, function(c) { return c.toUpperCase(); }) + ' – ZoneUp';

    fetch('./' + page + '.json')
      .then(function(res) { return res.json(); })
      .then(function(data) {
        document.getElementById('legalTitle').textContent = data.title;

        var container = document.getElementById('legalContent');
        data.sections.forEach(function(section) {
          if (section.heading) {
            var h2 = document.createElement('h2');
            h2.className = 'legal-section-title';
            h2.textContent = section.heading;
            container.appendChild(h2);
          }
          section.content.forEach(function(text) {
            var p = document.createElement('p');
            p.className = 'legal-text';
            p.textContent = text;
            container.appendChild(p);
          });
        });
      });
  </script>
</body>
</html>
