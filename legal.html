<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://fonts.cdnfonts.com/css/satoshi" rel="stylesheet" />
    <title>ZoneUp</title>
    <link rel="icon" type="image/x-icon" href="./Assets/favIcon.svg" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="legal.css" />
  </head>
  <body>
    <div class="header-spacer" id="headerSpacer"></div>
    <header class="header" id="header">
      <div class="header-inner" id="headerInner">
        <div class="header-top">
          <a href="index.html" class="logo">
            <img src="./Assets/logo.svg" class="logo-icon" alt="ZoneUp Logo" />
          </a>
          <a href="#" class="btn-purchase"
            >Get the app
            <span class="btn-icon"><span data-icon="⚡">⚡</span></span></a
          >
        </div>
      </div>
    </header>

    <main class="legal-page">
      <div class="legal-container">
        <h1 class="legal-title" id="legalTitle"></h1>
        <div class="legal-content" id="legalContent"></div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <div class="footer-cta">
          <div class="footer-cta-left">
            <h2 class="footer-cta-title">
              Where Neighbours become friends. <br />
              Ready to start giving?
            </h2>
            <div class="footer-cta-buttons">
              <a href="#" class="btn-purchase footer-btn-light"
                >Get the app
                <span class="btn-icon"><span data-icon="⚡">⚡</span></span></a
              >
            </div>
          </div>
          <div class="footer-right">
            <div class="footer-socials">
              <a
                href="https://x.com/zoneup_official?s=11"
                aria-label="Twitter"
                class="social-icon social-x"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M4 4l11.733 16h4.267l-11.733 -16z M4 20l6.768 -6.768m2.46 -2.46l6.772 -6.772"
                    stroke="currentColor"
                    stroke-width="2"
                    fill="none"
                  />
                </svg>
              </a>
              <a
                href="#"
                aria-label="LinkedIn"
                class="social-icon social-linkedin"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                >
                  <path
                    d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"
                    stroke="none"
                  />
                  <rect x="2" y="9" width="4" height="12" />
                  <circle cx="4" cy="4" r="2" />
                </svg>
              </a>

              <a
                href="https://www.instagram.com/zoneup_official/"
                aria-label="Instagram"
                class="social-icon social-instagram"
              >
                <svg
                  width="20"
                  height="20"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="2" y="2" width="20" height="20" rx="5" />
                  <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z" />
                  <line x1="17.5" y1="6.5" x2="17.51" y2="6.5" />
                </svg>
              </a>
            </div>

            <p class="footer-copyright">
              Reach out us at:
              <a href="mailto:support@zoneup.in"
                ><span class="mailto">support@zoneup.in</span></a
              >
            </p>
          </div>
        </div>
        <div class="footer-watermark" id="footerWatermark">
          <span class="watermark-text">zoneup</span>
          <div class="watermark-glow" id="watermarkGlow"></div>
        </div>
        <div class="footer-bottom-bar">
          <div class="footer-status">
            <span class="status-dot"></span>
            <span>Alive & Kicking!</span>
          </div>
          <div class="footer-legal">
            <a href="legal.html?page=privacy-policy"
              ><span data-text="Privacy Policy">Privacy Policy</span></a
            >
            <a href="legal.html?page=cookies-policy"
              ><span data-text="Cookies Policy">Cookies Policy</span></a
            >
            <a href="legal.html?page=terms-of-service"
              ><span data-text="Terms and Condition"
                >Terms and Condition</span
              ></a
            >
          </div>
          <p class="footer-copyright">© ZoneUp Private Limited — 2026</p>
        </div>
      </div>
    </footer>

    <script>
      // Header shrink
      const header = document.getElementById("header");
      const spacer = document.getElementById("headerSpacer");
      spacer.style.height = header.offsetHeight + "px";

      window.addEventListener("scroll", function () {
        if (window.scrollY > spacer.offsetHeight) {
          header.classList.add("shrink");
        } else {
          header.classList.remove("shrink");
        }
      });

      // Watermark glow
      var footerWatermark = document.getElementById("footerWatermark");
      var watermarkText = footerWatermark
        ? footerWatermark.querySelector(".watermark-text")
        : null;
      if (footerWatermark && watermarkText) {
        footerWatermark.addEventListener("mousemove", function (e) {
          if (window.innerWidth > 768) {
            var rect = footerWatermark.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;
            watermarkText.style.background =
              "radial-gradient(circle 400px at " +
              x +
              "px " +
              y +
              "px, rgba(67, 206, 162, 0.55) 0%, rgba(24, 90, 157, 0.3) 25%, rgba(67, 206, 162, 0.1) 50%, rgba(255, 255, 255, 0.06) 70%)";
            watermarkText.style.webkitBackgroundClip = "text";
            watermarkText.style.backgroundClip = "text";
          }
        });
        footerWatermark.addEventListener("mouseleave", function () {
          if (window.innerWidth > 768) {
            watermarkText.style.background = "rgba(255, 255, 255, 0.06)";
            watermarkText.style.webkitBackgroundClip = "text";
            watermarkText.style.backgroundClip = "text";
          }
        });
      }

      // Determine which JSON to load from query param
      var params = new URLSearchParams(window.location.search);
      var page = params.get("page") || "privacy-policy";
      var allowed = [
        "privacy-policy",
        "terms-of-service",
        "cookies-policy",
        "delete-account",
      ];
      if (allowed.indexOf(page) === -1) page = "privacy-policy";

      document.title =
        page.replace(/-/g, " ").replace(/\b\w/g, function (c) {
          return c.toUpperCase();
        }) + " – ZoneUp";

      fetch("./" + page + ".json")
        .then(function (res) {
          return res.json();
        })
        .then(function (data) {
          document.getElementById("legalTitle").textContent = data.title;

          var container = document.getElementById("legalContent");
          data.sections.forEach(function (section) {
            if (section.heading) {
              var h2 = document.createElement("h2");
              h2.className = "legal-section-title";
              h2.textContent = section.heading;
              container.appendChild(h2);
            }
            section.content.forEach(function (text) {
              var p = document.createElement("p");
              p.className = "legal-text";
              p.textContent = text;
              container.appendChild(p);
            });
          });
        });
    </script>
    <script>
      // Page transition: fade in on load, fade out on navigate
      document.addEventListener("DOMContentLoaded", function () {
        document.body.classList.add("page-ready");
      });
      document.addEventListener("click", function (e) {
        var link = e.target.closest("a[href]");
        if (!link) return;
        var href = link.getAttribute("href");
        if (
          !href ||
          href.startsWith("#") ||
          href.startsWith("javascript") ||
          link.target === "_blank"
        )
          return;
        e.preventDefault();
        document.body.classList.add("page-leaving");
        document.body.classList.remove("page-ready");
        setTimeout(function () {
          window.location.href = href;
        }, 300);
      });
    </script>
  </body>
</html>
